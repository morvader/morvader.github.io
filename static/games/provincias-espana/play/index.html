<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ Brawl Provincias - ¡Guille, conquista España!</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<!-- ==================== SPIKE SVG (inline, reusable) ==================== -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <symbol id="spike-icon" viewBox="0 0 120 140">
            <ellipse cx="60" cy="134" rx="28" ry="5" fill="rgba(0,0,0,0.18)"/>
            <rect x="37" y="112" width="14" height="16" rx="5" fill="#8B5E3C"/>
            <rect x="67" y="112" width="14" height="16" rx="5" fill="#8B5E3C"/>
            <rect x="35" y="122" width="16" height="8" rx="4" fill="#6B4226"/>
            <rect x="65" y="122" width="18" height="8" rx="4" fill="#6B4226"/>
            <ellipse cx="60" cy="72" rx="32" ry="42" fill="#8BC34A"/>
            <ellipse cx="60" cy="70" rx="30" ry="40" fill="#9ACD32"/>
            <ellipse cx="52" cy="62" rx="18" ry="28" fill="#A8D840" opacity="0.5"/>
            <rect x="28" y="98" width="64" height="10" rx="3" fill="#8B5E3C"/>
            <rect x="28" y="99" width="64" height="4" rx="2" fill="#A0714F"/>
            <circle cx="60" cy="103" r="6" fill="#DAA520"/>
            <circle cx="60" cy="103" r="4" fill="#FFD700"/>
            <circle cx="60" cy="103" r="2.2" fill="#DAA520"/>
            <ellipse cx="24" cy="72" rx="12" ry="16" fill="#8BC34A"/>
            <ellipse cx="24" cy="72" rx="10" ry="14" fill="#9ACD32"/>
            <ellipse cx="18" cy="70" rx="7" ry="11" fill="#9C27B0" opacity="0.85"/>
            <ellipse cx="18" cy="70" rx="5.5" ry="9" fill="#AB47BC" opacity="0.7"/>
            <ellipse cx="96" cy="72" rx="12" ry="16" fill="#8BC34A"/>
            <ellipse cx="96" cy="72" rx="10" ry="14" fill="#9ACD32"/>
            <ellipse cx="102" cy="70" rx="7" ry="11" fill="#9C27B0" opacity="0.85"/>
            <ellipse cx="102" cy="70" rx="5.5" ry="9" fill="#AB47BC" opacity="0.7"/>
            <circle cx="42" cy="42" r="3" fill="#7CB342"/>
            <circle cx="76" cy="45" r="2.8" fill="#7CB342"/>
            <circle cx="38" cy="80" r="2.5" fill="#7CB342"/>
            <circle cx="80" cy="78" r="2.5" fill="#7CB342"/>
            <circle cx="50" cy="95" r="2" fill="#7CB342"/>
            <circle cx="72" cy="92" r="2" fill="#7CB342"/>
            <ellipse cx="60" cy="28" rx="5" ry="8" fill="#8BC34A"/>
            <circle cx="54" cy="18" r="6.5" fill="#E53935"/>
            <circle cx="66" cy="18" r="6.5" fill="#E53935"/>
            <circle cx="53" cy="10" r="6.5" fill="#E53935"/>
            <circle cx="67" cy="10" r="6.5" fill="#E53935"/>
            <circle cx="60" cy="7" r="6.5" fill="#EF5350"/>
            <circle cx="60" cy="14" r="5" fill="#FF7043"/>
            <circle cx="60" cy="14" r="3" fill="#FFCA28"/>
            <ellipse cx="45" cy="60" rx="7.5" ry="10" fill="#3E2723"/>
            <ellipse cx="75" cy="60" rx="7.5" ry="10" fill="#3E2723"/>
            <ellipse cx="43" cy="56" rx="3" ry="3.5" fill="rgba(255,255,255,0.35)"/>
            <ellipse cx="73" cy="56" rx="3" ry="3.5" fill="rgba(255,255,255,0.35)"/>
            <ellipse cx="60" cy="80" rx="10" ry="8" fill="#3E2723"/>
            <ellipse cx="60" cy="81" rx="7.5" ry="5.5" fill="#5D4037"/>
        </symbol>
    </defs>
</svg>

<!-- ==================== LOADING SCREEN ==================== -->
<div id="loading" class="screen active loading-screen">
    <svg class="spike-avatar" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
    <div class="logo-title" style="font-size:clamp(20px,5vw,36px)">Cargando mapa...</div>
    <div class="loading-spinner"></div>
</div>

<!-- ==================== WELCOME SCREEN ==================== -->
<div id="welcome" class="screen">
    <svg class="spike-avatar" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
    <div class="logo-title">BRAWL<br>PROVINCIAS</div>
    <div class="logo-subtitle">¡Conquista el mapa de España!</div>
    <div class="player-name">⭐ GUILLE ⭐</div>
    <div class="trophy-display">
        <span>🏆</span>
        <span id="total-trophies">0</span>
    </div>
    <div id="rank-display" class="rank-badge" style="background:#225522;color:#44dd55;border:2px solid #44dd55;">Recluta</div>
    <div id="spike-welcome-msg" class="spike-message" style="display:none">
        <svg style="width:32px;height:32px;flex-shrink:0" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
        <span id="spike-msg-text"></span>
    </div>
    <div class="mode-buttons">
        <button class="btn btn-primary" data-action="start-all">⚔️ Todas las Provincias</button>
        <button class="btn btn-secondary" data-action="show-community">🗺️ Por Comunidad</button>
        <button class="btn btn-danger" data-action="start-mistakes" id="btn-mistakes" style="display:none">💀 Revancha de Fallos</button>
        <button class="btn btn-success btn-small" data-action="start-timed">⏱️ Contrarreloj (30s)</button>
    </div>
</div>

<!-- ==================== COMMUNITY SELECT ==================== -->
<div id="community-select" class="screen">
    <svg style="width:60px;height:60px" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
    <div class="logo-title" style="font-size:clamp(18px,4.5vw,28px);">Elige Comunidad</div>
    <div class="filter-bar" id="community-chips"></div>
    <div style="display:flex;gap:10px;width:100%;max-width:380px;">
        <button class="btn btn-primary" data-action="start-community">¡A jugar!</button>
        <button class="btn btn-secondary" data-action="show-welcome">Volver</button>
    </div>
</div>

<!-- ==================== GAME SCREEN ==================== -->
<div id="game" class="screen">
    <div class="game-hud">
        <div class="hud-left">
            <svg class="hud-spike" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
            <div class="hud-trophies">🏆 <span id="hud-score">0</span></div>
        </div>
        <div class="hud-streak" id="hud-streak">🔥 0</div>
        <div class="hud-right">
            <div class="hud-progress" id="hud-progress">0/50</div>
        </div>
    </div>
    <div class="timer-bar" id="timer-bar" style="display:none">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
    </div>
    <div class="question-bar">
        <div class="question-text" id="question-text">¿Dónde está...?</div>
        <div class="question-hint" id="question-hint"></div>
    </div>
    <div class="map-container" id="map-container">
        <svg id="map-svg"></svg>
        <div class="feedback-overlay" id="feedback-overlay"></div>
    </div>
    <div class="game-bottom-bar">
        <button class="btn btn-secondary btn-small" data-action="skip">Saltar ⏭️</button>
        <button class="btn btn-danger btn-small" data-action="end">Salir 🚪</button>
    </div>
</div>

<!-- ==================== RESULTS SCREEN ==================== -->
<div id="results" class="screen">
    <svg style="width:clamp(60px,15vw,100px);height:clamp(60px,15vw,100px)" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
    <div class="results-title" id="results-title" style="color:var(--yellow)">¡Victoria!</div>
    <div id="spike-results-msg" class="spike-message" style="display:none">
        <svg style="width:32px;height:32px;flex-shrink:0" viewBox="0 0 120 140"><use href="#spike-icon"/></svg>
        <span id="spike-results-text"></span>
    </div>
    <div class="results-stats">
        <div class="stat-card">
            <div class="stat-value" style="color:var(--trophy)" id="stat-trophies">0</div>
            <div class="stat-label">Trofeos ganados</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:var(--green)" id="stat-correct">0</div>
            <div class="stat-label">Aciertos</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:var(--red)" id="stat-wrong">0</div>
            <div class="stat-label">Fallos</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:var(--orange)" id="stat-streak">0</div>
            <div class="stat-label">Mejor racha</div>
        </div>
    </div>
    <div class="wrong-list" id="wrong-list-container" style="display:none">
        <h3>💀 Provincias para repasar:</h3>
        <div id="wrong-list"></div>
    </div>
    <div class="results-buttons">
        <button class="btn btn-primary" data-action="replay">🔄 Jugar de nuevo</button>
        <button class="btn btn-danger" data-action="start-mistakes" id="btn-mistakes-results" style="display:none">💀 Revancha</button>
        <button class="btn btn-secondary" data-action="show-welcome">🏠 Menú</button>
    </div>
</div>

<!-- ==================== CONFETTI ==================== -->
<div class="confetti-container" id="confetti-container"></div>

<!-- ==================== VENDOR LIBS ==================== -->
<script src="vendor/d3-array.js"></script>
<script src="vendor/d3-geo.js"></script>
<script src="vendor/topojson-client.js"></script>

<!-- ==================== APP CODE ==================== -->
<script src="scripts/topo-data.js"></script>
<script src="scripts/data.js"></script>
<script src="scripts/persistence.js"></script>
<script src="scripts/audio.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/map-renderer.js"></script>
<script src="scripts/game.js"></script>
<script src="scripts/main.js"></script>

</body>
</html>
